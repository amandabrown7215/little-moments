<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Little Moments">
<title>Little Moments</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-soft: #4a4a6a;
    --ink-faint: #9090b0;
    --page: #faf9f7;
    --page-warm: #f4f0eb;
    --blush: #e8c5b5;
    --blush-deep: #c9876a;
    --sage: #8aab8e;
    --sage-light: #d4e8d6;
    --sky: #b8d4e8;
    --gold: #d4a843;
    --border: #e2ddd8;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--page);
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ---- HEADER ---- */
  .header {
    background: var(--page);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-title {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.3px;
  }

  .app-title span {
    color: var(--blush-deep);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-soft);
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--page-warm); }

  /* ---- TAB BAR ---- */
  .tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 7px 4px;
    border: none;
    background: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-faint);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--ink);
    color: white;
  }

  /* ---- MAIN ---- */
  .main {
    padding: 16px 20px calc(90px + env(safe-area-inset-bottom));
  }

  /* ---- ON THIS DAY BANNER ---- */
  .on-this-day {
    background: linear-gradient(135deg, #fef3ec 0%, #f9ede6 100%);
    border: 1px solid var(--blush);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
  }

  .on-this-day-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--blush-deep);
    margin-bottom: 6px;
  }

  .on-this-day-entry {
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--blush);
  }
  .on-this-day-entry:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .on-this-day-text {
    font-family: 'Lora', serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    font-style: italic;
  }

  .on-this-day-meta {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 3px;
  }

  /* ---- ADD ENTRY PANEL ---- */
  .add-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .add-panel-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .kids-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .kid-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }
  .kid-chip.selected {
    border-color: var(--blush-deep);
    background: var(--blush-deep);
    color: white;
  }
  .kid-chip.add-kid {
    border-style: dashed;
    color: var(--ink-faint);
  }

  .category-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .cat-chip {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cat-chip.selected { border-color: var(--ink); background: var(--ink); color: white; }

  textarea.entry-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-family: 'Lora', serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--page);
    resize: none;
    min-height: 90px;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea.entry-input:focus { border-color: var(--blush-deep); }
  textarea.entry-input::placeholder { color: var(--ink-faint); font-style: italic; }

  .save-btn {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.2px;
  }
  .save-btn:hover { background: #2d2d50; }
  .save-btn:disabled { background: var(--border); color: var(--ink-faint); cursor: default; }

  /* ---- TIMELINE ---- */
  .timeline-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }

  .date-group {
    margin-bottom: 20px;
  }

  .date-group-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-faint);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .entry-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    position: relative;
    transition: box-shadow 0.15s;
  }
  .entry-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .entry-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .kid-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--blush-deep);
    color: white;
  }

  .cat-badge {
    font-size: 11px;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .entry-time {
    font-size: 11px;
    color: var(--ink-faint);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .entry-text {
    font-family: 'Lora', serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
  }

  .entry-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .entry-delete:hover, .entry-delete:active { background: #ffe5e5; color: #c0392b; }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--ink-faint);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h3 {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ---- SETTINGS / KIDS VIEW ---- */
  .settings-section {
    margin-bottom: 24px;
  }

  .settings-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }

  .kids-manager {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .kid-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
  }

  .kid-row-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
  }

  .kid-count {
    font-size: 12px;
    color: var(--ink-faint);
  }

  .btn-remove {
    border: none;
    background: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: #c0392b; }

  .add-kid-form {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .add-kid-form input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    background: var(--page);
    transition: border-color 0.15s;
  }
  .add-kid-form input:focus { border-color: var(--blush-deep); }

  .btn-add {
    padding: 10px 16px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #2d2d50; }

  .data-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .data-btn {
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
  }
  .data-btn:hover { background: var(--page-warm); }
  .data-btn.danger { color: #c0392b; border-color: #f5c6c6; }
  .data-btn.danger:hover { background: #fff5f5; }

  /* ---- FILTER BAR ---- */
  .filter-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .filter-chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: white;
  }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: calc(80px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- BOTTOM NAV ---- */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(20px, env(safe-area-inset-bottom));
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 4px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--ink-faint);
    transition: color 0.15s;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .nav-btn.active { color: var(--blush-deep); }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }

  /* ---- ADD MODAL (floating) ---- */
  .fab {
    position: fixed;
    bottom: 80px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--blush-deep);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(201,135,106,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
  }
  .fab:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(201,135,106,0.5); }

  /* modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,26,46,0.5);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-backdrop.open { display: flex; }

  .modal-sheet {
    background: var(--page);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 16px;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 380px) {
    .app-title { font-size: 19px; }
    .entry-text { font-size: 14px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-title">little <span>moments</span></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="exportData()" title="Export backup">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('journal')">Journal</button>
    <button class="tab" onclick="switchTab('memories')">Memories</button>
    <button class="tab" onclick="switchTab('settings')">Settings</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- JOURNAL TAB -->
  <div id="tab-journal">

    <!-- On This Day -->
    <div id="on-this-day-section" style="display:none"></div>

    <!-- Add Entry Panel -->
    <div class="add-panel">
      <div class="add-panel-label">New moment</div>

      <div class="kids-row" id="kid-selector">
        <!-- populated by JS -->
      </div>

      <div class="category-row">
        <button class="cat-chip selected" data-cat="said" onclick="selectCat(this)">💬 Said</button>
        <button class="cat-chip" data-cat="did" onclick="selectCat(this)">⭐ Did</button>
        <button class="cat-chip" data-cat="milestone" onclick="selectCat(this)">🎉 Milestone</button>
        <button class="cat-chip" data-cat="cute" onclick="selectCat(this)">🥰 Cute</button>
      </div>

      <textarea class="entry-input" id="entry-text" placeholder="Write it down before you forget…" rows="3"></textarea>

      <button class="save-btn" id="save-btn" onclick="saveEntry()">Save this moment</button>
    </div>

    <!-- Today's entries -->
    <div id="today-entries"></div>

  </div>

  <!-- MEMORIES TAB -->
  <div id="tab-memories" style="display:none">
    <div class="filter-bar" id="filter-bar">
      <button class="filter-chip active" data-filter="all" onclick="setFilter(this, 'all')">All</button>
      <!-- kid filters added by JS -->
    </div>
    <div id="timeline"></div>
  </div>

  <!-- SETTINGS TAB -->
  <div id="tab-settings" style="display:none">

    <div class="settings-section">
      <div class="settings-title">Kids</div>
      <div class="kids-manager" id="kids-manager"></div>
      <div class="add-kid-form">
        <input type="text" id="new-kid-name" placeholder="Add a name…" maxlength="20" onkeydown="if(event.key==='Enter') addKid()">
        <button class="btn-add" onclick="addKid()">Add</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Your data</div>
      <div class="data-btns">
        <button class="data-btn" onclick="exportData()">
          <span>⬇️</span> Export backup (JSON)
        </button>
        <button class="data-btn" onclick="document.getElementById('import-file').click()">
          <span>⬆️</span> Restore from backup
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
        <button class="data-btn danger" onclick="confirmClearAll()">
          <span>🗑️</span> Clear all data
        </button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">About</div>
      <div style="background:white;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;">
        <p style="font-size:13px;color:var(--ink-soft);line-height:1.6;">
          <strong style="color:var(--ink)">little moments</strong> stores everything on this device only. Nothing is uploaded anywhere. Export regularly to keep a backup safe.
        </p>
        <p style="font-size:12px;color:var(--ink-faint);margin-top:8px;">
          Tip: On iPhone, tap Share → "Add to Home Screen" to install as an app.
        </p>
      </div>
    </div>

  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-journal" onclick="switchTab('journal')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Journal
  </button>
  <button class="nav-btn" id="nav-memories" onclick="switchTab('memories')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Memories
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchTab('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA LAYER
// ============================================================

const STORAGE_KEY = 'little_moments_data';

function getData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { kids: [], entries: [] };
    return JSON.parse(raw);
  } catch(e) {
    return { kids: [], entries: [] };
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ============================================================
// STATE
// ============================================================

let currentTab = 'journal';
let selectedKid = null;
let selectedCat = 'said';
let filterKid = 'all';

// ============================================================
// INIT
// ============================================================

function init() {
  const data = getData();
  // Seed a kid name prompt if none exist
  if (data.kids.length === 0) {
    // Show welcome - just render empty state with prompt
  }
  renderKidSelector();
  renderOnThisDay();
  renderTodayEntries();
  renderTimeline();
  renderKidsManager();
  renderFilterBar();
}

// ============================================================
// TABS
// ============================================================

function switchTab(tab) {
  currentTab = tab;
  ['journal','memories','settings'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
    const tabBtn = document.querySelector(`.tab[onclick="switchTab('${t}')"]`);
    if (tabBtn) tabBtn.classList.toggle('active', t === tab);
  });
  if (tab === 'memories') renderTimeline();
  if (tab === 'settings') { renderKidsManager(); renderFilterBar(); }
}

// ============================================================
// KIDS
// ============================================================

function renderKidSelector() {
  const data = getData();
  const sel = document.getElementById('kid-selector');
  let html = '';
  data.kids.forEach(k => {
    const active = selectedKid === k ? 'selected' : '';
    html += `<button class="kid-chip ${active}" onclick="selectKid(this,'${esc(k)}')">${esc(k)}</button>`;
  });
  if (data.kids.length === 0) {
    html = `<span style="font-size:13px;color:var(--ink-faint);font-style:italic">Add a child's name in Settings first</span>`;
  }
  sel.innerHTML = html;
  // auto-select if only one kid
  if (data.kids.length === 1 && !selectedKid) {
    selectedKid = data.kids[0];
    renderKidSelector();
  }
}

function selectKid(btn, name) {
  selectedKid = (selectedKid === name) ? null : name;
  renderKidSelector();
}

function addKid() {
  const input = document.getElementById('new-kid-name');
  const name = input.value.trim();
  if (!name) return;
  const data = getData();
  if (data.kids.includes(name)) { showToast('Already added!'); return; }
  data.kids.push(name);
  saveData(data);
  input.value = '';
  renderKidSelector();
  renderKidsManager();
  renderFilterBar();
  showToast(`${name} added 🎉`);
}

function removeKid(name) {
  if (!confirm(`Remove ${name}? Their entries will stay but won't be linked.`)) return;
  const data = getData();
  data.kids = data.kids.filter(k => k !== name);
  saveData(data);
  if (selectedKid === name) selectedKid = null;
  renderKidSelector();
  renderKidsManager();
  renderFilterBar();
}

function renderKidsManager() {
  const data = getData();
  const el = document.getElementById('kids-manager');
  if (data.kids.length === 0) {
    el.innerHTML = `<p style="font-size:13px;color:var(--ink-faint);font-style:italic;padding:4px 0">No children added yet.</p>`;
    return;
  }
  el.innerHTML = data.kids.map(k => {
    const count = data.entries.filter(e => e.kid === k).length;
    return `<div class="kid-row">
      <div>
        <div class="kid-row-name">${esc(k)}</div>
        <div class="kid-count">${count} moment${count !== 1 ? 's' : ''}</div>
      </div>
      <button class="btn-remove" onclick="removeKid('${esc(k)}')" title="Remove">×</button>
    </div>`;
  }).join('');
}

// ============================================================
// CATEGORIES
// ============================================================

function selectCat(btn) {
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = btn.dataset.cat;
}

const CAT_ICONS = { said: '💬', did: '⭐', milestone: '🎉', cute: '🥰' };
const CAT_LABELS = { said: 'Said', did: 'Did', milestone: 'Milestone', cute: 'Cute' };

// ============================================================
// SAVE ENTRY
// ============================================================

function saveEntry() {
  const text = document.getElementById('entry-text').value.trim();
  if (!text) { showToast('Write something first!'); return; }

  const data = getData();
  const entry = {
    id: Date.now().toString(),
    kid: selectedKid || null,
    cat: selectedCat,
    text: text,
    date: todayStr(),
    time: nowTimeStr(),
    ts: Date.now()
  };

  data.entries.unshift(entry);
  saveData(data);

  document.getElementById('entry-text').value = '';
  renderTodayEntries();
  renderOnThisDay();

  showToast('Saved ✓');
}

// ============================================================
// TODAY ENTRIES
// ============================================================

function renderTodayEntries() {
  const data = getData();
  const today = todayStr();
  const todays = data.entries.filter(e => e.date === today);
  const el = document.getElementById('today-entries');

  if (todays.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">✨</div>
      <h3>Today's moments</h3>
      <p>Nothing saved yet today.<br>Write something before it slips away.</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="timeline-label">Today</div>` +
    todays.map(e => entryCardHTML(e)).join('');
}

// ============================================================
// ON THIS DAY
// ============================================================

function renderOnThisDay() {
  const data = getData();
  const today = todayStr(); // YYYY-MM-DD
  const mmdd = today.slice(5); // MM-DD

  const past = data.entries.filter(e =>
    e.date !== today && e.date.slice(5) === mmdd
  );

  const section = document.getElementById('on-this-day-section');
  if (past.length === 0) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  section.innerHTML = `<div class="on-this-day">
    <div class="on-this-day-label">✨ On this day</div>
    ${past.map(e => `
      <div class="on-this-day-entry">
        <div class="on-this-day-text">"${esc(e.text)}"</div>
        <div class="on-this-day-meta">${e.kid ? esc(e.kid) + ' · ' : ''}${formatDateDisplay(e.date)}</div>
      </div>
    `).join('')}
  </div>`;
}

// ============================================================
// TIMELINE / MEMORIES
// ============================================================

function setFilter(btn, kid) {
  filterKid = kid;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline();
}

function renderFilterBar() {
  const data = getData();
  const bar = document.getElementById('filter-bar');
  let html = `<button class="filter-chip ${filterKid === 'all' ? 'active' : ''}" data-filter="all" onclick="setFilter(this,'all')">All</button>`;
  data.kids.forEach(k => {
    html += `<button class="filter-chip ${filterKid === k ? 'active' : ''}" onclick="setFilter(this,'${esc(k)}')">${esc(k)}</button>`;
  });
  bar.innerHTML = html;
}

function renderTimeline() {
  const data = getData();
  let entries = [...data.entries];
  if (filterKid !== 'all') entries = entries.filter(e => e.kid === filterKid);

  const el = document.getElementById('timeline');

  if (entries.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📖</div>
      <h3>Nothing here yet</h3>
      <p>Moments you save will appear here.</p>
    </div>`;
    return;
  }

  // Group by date
  const groups = {};
  entries.forEach(e => {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });

  const sortedDates = Object.keys(groups).sort((a,b) => b.localeCompare(a));

  el.innerHTML = sortedDates.map(date => `
    <div class="date-group">
      <div class="date-group-header">${formatDateDisplay(date)}</div>
      ${groups[date].map(e => entryCardHTML(e)).join('')}
    </div>
  `).join('');
}

// ============================================================
// ENTRY CARD
// ============================================================

function entryCardHTML(e) {
  return `<div class="entry-card" id="entry-${e.id}">
    <div class="entry-card-top">
      <div class="entry-meta">
        ${e.kid ? `<span class="kid-badge">${esc(e.kid)}</span>` : ''}
        <span class="cat-badge">${CAT_ICONS[e.cat] || '📝'} ${CAT_LABELS[e.cat] || e.cat}</span>
      </div>
      <span class="entry-time">${e.time || ''}</span>
    </div>
    <div class="entry-text">${esc(e.text)}</div>
    <button class="entry-delete" onclick="deleteEntry('${e.id}')" title="Delete">×</button>
  </div>`;
}

function deleteEntry(id) {
  if (!confirm('Delete this moment?')) return;
  const data = getData();
  data.entries = data.entries.filter(e => e.id !== id);
  saveData(data);
  renderTodayEntries();
  renderTimeline();
  renderOnThisDay();
  renderKidsManager();
  showToast('Deleted');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================

function exportData() {
  const data = getData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `little-moments-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded ✓');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.entries || !imported.kids) throw new Error('Invalid format');
      if (!confirm(`Import ${imported.entries.length} entries? This will replace your current data.`)) return;
      saveData(imported);
      init();
      showToast(`Imported ${imported.entries.length} moments ✓`);
    } catch(err) {
      showToast('Import failed — invalid file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmClearAll() {
  if (!confirm('Delete ALL moments and kids? This cannot be undone.')) return;
  if (!confirm('Are you sure? All your memories will be gone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  selectedKid = null;
  init();
  showToast('All data cleared');
}

// ============================================================
// HELPERS
// ============================================================

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function nowTimeStr() {
  return new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);

  if (dateStr === todayStr()) return 'Today';
  if (dateStr === yesterday.toISOString().slice(0,10)) return 'Yesterday';

  return d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// START
// ============================================================

init();
</script>
</body>
</html>
